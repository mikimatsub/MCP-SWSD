<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWSD Incidents</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="root">
      <header>
        <h1 id="title">Incidents</h1>
        <input
          type="search"
          id="search"
          placeholder="Filter (name, assignee, requester, category)"
          autocomplete="off"
        />
      </header>
      <div class="table-scroll">
        <table id="table">
          <thead>
            <tr>
              <th data-sort="number" scope="col" aria-sort="none">#</th>
              <th data-sort="name" scope="col" aria-sort="none">Name</th>
              <th data-sort="state" scope="col" aria-sort="none">State</th>
              <th data-sort="priority" scope="col" aria-sort="none">Priority</th>
              <th data-sort="assignee_email" scope="col" aria-sort="none">Assignee</th>
              <th data-sort="updated_at" scope="col" aria-sort="none">Updated</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <p id="empty" class="empty" hidden>No incidents match the current filter.</p>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
