name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
# Saves CI minutes; the latest commit's run supersedes older ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  docker:
    name: Build + smoke Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (loaded into local Docker, not pushed)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: swsd-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the container
        run: |
          docker run --rm -d --name swsd-mcp-ci -p 3000:3000 \
            -e SWSD_TRANSPORT=http \
            -e SWSD_BASE_URL=https://api.samanage.com \
            swsd-mcp:ci

          # Wait up to 15s for /healthz to respond
          for i in $(seq 1 15); do
            if curl -sSf http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "Container is healthy."
              break
            fi
            echo "Waiting for /healthz... ($i/15)"
            sleep 1
          done

          # Final verification — must contain "ok":true
          response=$(curl -sS http://localhost:3000/healthz)
          echo "Response: $response"
          echo "$response" | grep -q '"ok":true' || (echo "Healthz did not return ok=true" && exit 1)

          # Verify /mcp without auth returns 401
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"tools/list","id":1}' \
            http://localhost:3000/mcp)
          echo "/mcp without auth status: $status"
          [ "$status" = "401" ] || (echo "Expected 401 for unauthenticated /mcp, got $status" && exit 1)

          docker stop swsd-mcp-ci
