name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
# Saves CI minutes; the latest commit's run supersedes older ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  docker:
    name: Build + smoke Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build image (loaded into local Docker, not pushed)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: false
          load: true
          tags: swsd-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the container
        run: |
          docker run --rm -d --name swsd-mcp-ci -p 3000:3000 \
            -e SWSD_TRANSPORT=http \
            -e SWSD_BASE_URL=https://api.samanage.com \
            swsd-mcp:ci

          # Wait up to 15s for /healthz to respond
          for i in $(seq 1 15); do
            if curl -sSf http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "Container is healthy."
              break
            fi
            echo "Waiting for /healthz... ($i/15)"
            sleep 1
          done

          # Final verification — must contain "ok":true
          response=$(curl -sS http://localhost:3000/healthz)
          echo "Response: $response"
          echo "$response" | grep -q '"ok":true' || (echo "Healthz did not return ok=true" && exit 1)

          # Verify /mcp without auth returns 401
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"tools/list","id":1}' \
            http://localhost:3000/mcp)
          echo "/mcp without auth status: $status"
          [ "$status" = "401" ] || (echo "Expected 401 for unauthenticated /mcp, got $status" && exit 1)

          docker stop swsd-mcp-ci

  publish:
    name: Publish image to ghcr.io
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, docker]
    # Only publish from main branch pushes (not PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Compute lowercase image name
        # ghcr.io requires lowercase image names; github.repository preserves case.
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push to GHCR
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
