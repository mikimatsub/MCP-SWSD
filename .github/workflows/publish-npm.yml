name: Publish to npm

# Triggers on git tag matching v* (e.g., v1.0.0, v1.0.1). To release:
#   1. Bump package.json version: `npm version major|minor|patch`
#      (this also creates the git tag automatically)
#   2. Push the commit AND tag: `git push && git push --tags`
#   3. This workflow runs automatically.
#
# First-time setup (one-time, before first tag push):
#   1. Configure trusted publishing on npmjs.com:
#      - Log in to npmjs.com with hardware 2FA
#      - Go to your account/org settings > Trusted Publishers
#      - Add a new publisher: GitHub Actions
#        * Repository: mikimatsub/MCP-SWSD
#        * Workflow: .github/workflows/publish-npm.yml
#        * Environment: (leave empty)
#        * Package name: swsd-mcp (or @scope/swsd-mcp if scoped)
#   2. Push a v1.0.0 tag — this workflow publishes via OIDC, no NPM_TOKEN.
#
# Alternative for first publish if trusted publishing isn't set up yet:
#   Run `npm publish --provenance --access public` from your local machine
#   after `npm login`. Then configure trusted publishing as above for
#   subsequent automated releases.

on:
  push:
    tags:
      - 'v*'

# id-token: write enables OIDC trusted publishing to npm — no long-lived
# NPM_TOKEN secret required. The OIDC token is short-lived (minutes).
permissions:
  contents: read
  id-token: write

# Only one publish job at a time per tag. Prevents race conditions if a tag
# is force-pushed (which is bad practice but possible).
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify, publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node 24 with npm registry
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents (dry run)
        # Lists what would be included in the published tarball. If anything
        # surprising shows up here, the build fails. Compare to package.json `files`.
        run: npm pack --dry-run

      - name: Publish to npm with provenance
        # --provenance generates a SLSA build attestation that proves the
        # package was built from this exact commit by this exact workflow.
        # Users can verify with `npm view <pkg> --json | jq .dist.attestations`.
        # --access public required for first publish of unscoped packages and
        # is harmless on subsequent publishes.
        run: npm publish --provenance --access public
