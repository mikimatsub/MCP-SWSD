name: Publish to npm

# Triggers on git tag matching v* (e.g., v1.0.0, v1.0.1). After the
# initial publish (see "Chicken-and-egg" below), the release flow is:
#   1. `npm version major|minor|patch` (bumps package.json + creates tag)
#   2. `git push && git push --tags`
#   3. This workflow runs automatically — OIDC mints a short-lived token,
#      no NPM_TOKEN secret required.
#
# Chicken-and-egg for the FIRST publish:
#   npm trusted publishing is configured PER PACKAGE on npmjs.com — the
#   package must exist on npm before the trusted-publisher entry can be
#   created. So the very first publish must use manual auth.
#
# First-publish steps (run once from your local machine):
#   1. `npm login` (browser auth; uses 2FA when enabled on your account)
#   2. `npm version major` to bump 0.5.0 -> 1.0.0
#   3. `npm publish --provenance --access public`
#   4. `git push && git push --tags` (push the version-bump commit + tag)
#   5. On npmjs.com: go to your now-existing package page
#      (npmjs.com/package/swsd-mcp) -> Settings -> Trusted Publisher
#      -> Add GitHub Actions publisher with:
#        * Organization or user: mikimatsub
#        * Repository: MCP-SWSD
#        * Workflow filename: publish-npm.yml
#        * Environment: (leave empty)
#   6. Future releases: just `npm version <bump> && git push --tags`
#      and this workflow handles the rest via OIDC.

on:
  push:
    tags:
      - 'v*'

# id-token: write enables OIDC trusted publishing to npm — no long-lived
# NPM_TOKEN secret required. The OIDC token is short-lived (minutes).
permissions:
  contents: read
  id-token: write

# Only one publish job at a time per tag. Prevents race conditions if a tag
# is force-pushed (which is bad practice but possible).
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify, publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node 24 with npm registry
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents (dry run)
        # Lists what would be included in the published tarball. If anything
        # surprising shows up here, the build fails. Compare to package.json `files`.
        run: npm pack --dry-run

      - name: Publish to npm with provenance
        # --provenance generates a SLSA build attestation that proves the
        # package was built from this exact commit by this exact workflow.
        # Users can verify with `npm view <pkg> --json | jq .dist.attestations`.
        # --access public required for first publish of unscoped packages and
        # is harmless on subsequent publishes.
        run: npm publish --provenance --access public
